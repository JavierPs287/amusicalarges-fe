<section class="actualidad">
  <h2>Actualidad</h2>

  <div class="videos">
    @for(contenido of contenidos; track contenido.url) {

      <article class="video-card">

        <h3>{{contenido.titulo}}</h3>

        @if(contenido.fecha) {
          <span class="fecha">{{contenido.fecha}}</span>
        }

        <div class="video-container">

          <iframe
            [src]="getFacebookEmbed(contenido)"
            scrolling="no"
            frameborder="0"
            allowfullscreen="true"
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
          </iframe>

        </div>

      </article>

    }
  </div>
</section>

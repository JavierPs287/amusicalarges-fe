<section class="actualidad">
  <h2>Actualidad</h2>

  <div class="videos">
    @for(contenido of contenidos; track contenido.url) {

      <article class="video-card" #videoCardRef [attr.data-url]="contenido.url">

        <h3>{{contenido.titulo}}</h3>

        @if(contenido.fecha) {
          <span class="fecha">{{contenido.fecha | date:'d MMMM y':'es'}}</span>
        }

        <div class="video-container" [class.video]="contenido.tipo === 'video'" [class.post]="contenido.tipo !== 'video'">

          <iframe
            [src]="getFacebookEmbed(contenido)"
            scrolling="no"
            frameborder="0"
            allowfullscreen="true"
            allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
          </iframe>

        </div>

      </article>

    }
  </div>
</section>

name: Deploy to Firebase Hosting on push
on:
  push:
    branches: [ "main" ]
  pull-request:
    branches: [ "main" ]
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ASOCIACIONMUSICALARGES }}
          projectId: asociacionmusicalarges
          channelId: live